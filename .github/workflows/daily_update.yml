name: AI Agent Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual run

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requirements
        run: pip install requests

      - name: Run AI Agent
        env:
          AI_AGENT_KEY: ${{ secrets.AI_AGENT_KEY }}
        run: python agent_update.py

      - name: Commit and Push Update
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@autonomous-portfolio-2026.live"
          git add index.html
          git commit -m "Autonomous design update [2026 Core]"
          git push
