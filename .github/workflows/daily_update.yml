name: AI Agent Production Sync

on:
  schedule:
    # Runs at 06:00, 14:00, 22:00 UTC every day (3x daily)
    - cron: '0 6,14,22 * * *'
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        env:
          GEMINI: ${{ secrets.GEMINI }}
          TAVILY: ${{ secrets.TAVILY }}
          GROQ: ${{ secrets.GROQ }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEVTO_KEY: ${{ secrets.DEVTO_KEY }}
        run: python agent_update.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@autonomous-portfolio-2026.live"
          git add index.html sitemap.xml robots.txt
          # If Gemini failed (circuit breaker), index.html didn't change → commit exits 0 silently
          git commit -m "Production Lab Sync [$(date)]" || exit 0
          git push
