name: AI Agent Production Sync

on:
  schedule:
    # Runs 5x daily: 2am, 7am, 12pm, 5pm, 10pm UTC
    # = Phnom Penh: 9am, 2pm, 7pm, 12am, 5am
    - cron: '0 2,7,12,17,22 * * *'
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        env:
          GEMINI: ${{ secrets.GEMINI }}
          TAVILY: ${{ secrets.TAVILY }}
          GROQ: ${{ secrets.GROQ }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEVTO_KEY: ${{ secrets.DEVTO_KEY }}
        run: python agent_update.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@autonomous-portfolio-2026.live"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.html
          git add sitemap.xml robots.txt 2>/dev/null || true
          git commit -m "Production Lab Sync [$(date)]" || exit 0
          git push origin main
