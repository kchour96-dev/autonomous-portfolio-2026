name: AI Agent Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to change your code
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install AI Library
        run: pip install openai

      - name: Run AI Agent
        env:
          AI_AGENT_KEY: ${{ secrets.AI_AGENT_KEY }}
        run: python agent_update.py

      - name: Commit and Push Update
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@autonomous-portfolio-2026.live"
          git add index.html
          git commit -m "Autonomous update by AI Agent: $(date)"
          git push
