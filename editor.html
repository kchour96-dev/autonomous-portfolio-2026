<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Content Editor for Autonomous Portfolio - Create and edit blog posts and portfolio entries.">
    <meta name="keywords" content="content editor, markdown, portfolio, blog">
    <meta name="author" content="OpenClaw">
    <title>Content Editor - Autonomous Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* CSS Variables matching portfolio theme */
        :root {
            --color-bg: #0a0a0a;
            --color-surface: #121212;
            --color-text: #e6e6e6;
            --color-text-muted: #a3a3a3;
            --color-primary: #ff6b35;
            --color-primary-dark: #e55a2b;
            --color-border: #2a2a2a;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --container-width: 1200px;
            --transition: all 0.3s ease;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [data-theme="light"] {
            --color-bg: #ffffff;
            --color-surface: #f8f9fa;
            --color-text: #1a1a1a;
            --color-text-muted: #6c757d;
            --color-border: #dee2e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            background-color: var(--color-surface);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn:hover {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            min-height: 600px;
        }

        .editor-panel {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .textarea {
            flex: 1;
            width: 100%;
            padding: 15px;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        .textarea:focus {
            border-color: var(--color-primary);
        }

        .preview {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            line-height: 1.7;
        }

        .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            color: var(--color-primary);
        }

        .preview h1 { font-size: 2em; }
        .preview h2 { font-size: 1.5em; }
        .preview h3 { font-size: 1.25em; }

        .preview p { margin-bottom: 1em; }

        .preview code {
            background-color: var(--color-bg);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }

        .preview pre {
            background-color: var(--color-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: 1em 0;
        }

        .preview pre code {
            background: none;
            padding: 0;
        }

        .preview blockquote {
            border-left: 4px solid var(--color-primary);
            padding-left: 15px;
            margin: 1em 0;
            color: var(--color-text-muted);
        }

        .preview ul, .preview ol {
            margin: 1em 0;
            padding-left: 2em;
        }

        .preview li { margin-bottom: 0.5em; }

        .preview a {
            color: var(--color-primary);
            text-decoration: underline;
        }

        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .word-count {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--color-text);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background-color: var(--color-surface);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
                justify-content: space-between;
            }

            .status-bar {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--color-surface);
            border-radius: var(--border-radius);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 20px;
            color: var(--color-primary);
        }

        .modal textarea {
            width: 100%;
            min-height: 200px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: monospace;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; Back to Portfolio</a>

        <div class="header">
            <h1>Content Editor</h1>
            <div class="header-actions">
                <button class="btn" id="loadBtn">Load Draft</button>
                <button class="btn" id="saveBtn">Save Draft</button>
                <button class="btn" id="exportBtn">Export</button>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Markdown Editor</h2>
                    <span class="panel-subtitle">Write your content here</span>
                </div>
                <textarea class="textarea" id="editor" placeholder="Start writing your content in Markdown...

# Heading 1
## Heading 2
### Heading 3

**Bold text**
*Italic text*

- List item 1
- List item 2

[Link](https://example.com)

```javascript
console.log('Code block');
```

> Blockquote"></textarea>
            </div>

            <div class="editor-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Live Preview</h2>
                    <span class="panel-subtitle">See how it looks</span>
                </div>
                <div class="preview" id="preview"></div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-text" id="status">Ready to edit</div>
            <div class="word-count" id="wordCount">0 words</div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <h3>Export Content</h3>
            <p>Copy the content below to use in your portfolio:</p>
            <textarea id="exportContent" readonly></textarea>
            <div class="modal-actions">
                <button class="btn" id="copyBtn">Copy to Clipboard</button>
                <button class="btn" id="closeModal">Close</button>
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');
        const exportBtn = document.getElementById('exportBtn');
        const themeToggle = document.getElementById('themeToggle');
        const status = document.getElementById('status');
        const wordCount = document.getElementById('wordCount');
        const exportModal = document.getElementById('exportModal');
        const exportContent = document.getElementById('exportContent');
        const copyBtn = document.getElementById('copyBtn');
        const closeModal = document.getElementById('closeModal');

        // Storage key
        const STORAGE_KEY = 'portfolio-content-draft';

        // Theme management
        function initTheme() {
            const savedTheme = localStorage.getItem('portfolio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            const sunIcon = themeToggle.querySelector('.sun-icon');
            const moonIcon = themeToggle.querySelector('.moon-icon');
            if (theme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('portfolio-theme', newTheme);
            updateThemeIcon(newTheme);
        });

        // Markdown rendering
        function updatePreview() {
            const markdown = editor.value;
            preview.innerHTML = marked.parse(markdown);
            updateWordCount(markdown);
        }

        function updateWordCount(text) {
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            wordCount.textContent = `${words} word${words !== 1 ? 's' : ''}`;
        }

        // Auto-save functionality
        let autoSaveTimeout;
        function autoSave() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                localStorage.setItem(STORAGE_KEY, editor.value);
                status.textContent = 'Auto-saved';
                setTimeout(() => {
                    status.textContent = 'Ready to edit';
                }, 2000);
            }, 1000);
        }

        // Event listeners
        editor.addEventListener('input', () => {
            updatePreview();
            autoSave();
        });

        saveBtn.addEventListener('click', () => {
            localStorage.setItem(STORAGE_KEY, editor.value);
            status.textContent = 'Draft saved manually';
            setTimeout(() => {
                status.textContent = 'Ready to edit';
            }, 2000);
        });

        loadBtn.addEventListener('click', () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                editor.value = saved;
                updatePreview();
                status.textContent = 'Draft loaded';
                setTimeout(() => {
                    status.textContent = 'Ready to edit';
                }, 2000);
            } else {
                status.textContent = 'No saved draft found';
                setTimeout(() => {
                    status.textContent = 'Ready to edit';
                }, 2000);
            }
        });

        exportBtn.addEventListener('click', () => {
            const html = marked.parse(editor.value);
            exportContent.value = html;
            exportModal.classList.add('show');
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(exportContent.value);
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = 'Copy to Clipboard';
                }, 2000);
            } catch (err) {
                // Fallback for older browsers
                exportContent.select();
                document.execCommand('copy');
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = 'Copy to Clipboard';
                }, 2000);
            }
        });

        closeModal.addEventListener('click', () => {
            exportModal.classList.remove('show');
        });

        // Initialize
        initTheme();
        updatePreview();

        // Load saved content on page load
        const savedContent = localStorage.getItem(STORAGE_KEY);
        if (savedContent) {
            editor.value = savedContent;
            updatePreview();
        }
    </script>
</body>
</html>
