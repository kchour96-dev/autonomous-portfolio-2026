<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Research Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #020203; color: #f8fafc; font-family: 'Space Grotesk', sans-serif; text-align: left; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        #reportSection { display: none; }
    </style>
</head>
<body class="p-4 md:p-12 lg:p-20">
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-16 border-b border-white/5 pb-8">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">AUTONOMOUS_<span style="color: #3b82f6">LAB_2026</span></h1>
            <p class="text-[10px] mono text-slate-500 uppercase tracking-widest italic">Node Status: Low</p>
        </div>
        <div class="text-right text-[10px] mono text-slate-500 uppercase font-bold">
            <p style="color: #3b82f6">16 May 2026 | 17:26 UTC</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-8 space-y-12">
            <section class="glass p-10 rounded-[3rem]" style="border-left: 8px solid #3b82f6">
                <p style="color: #3b82f6" class="text-[10px] font-black uppercase tracking-[0.4em] mb-4">● Intelligence_Report</p>
                <h2 class="text-4xl md:text-7xl font-bold mb-6 tracking-tighter leading-none text-white italic">Neural Protocol Sync</h2>
                <p class="text-xl md:text-2xl text-slate-400 mb-10 leading-tight italic">"System rebalancing."</p>
                <button onclick="toggle()" id="btn" class="bg-white text-black px-10 py-4 rounded-full text-[11px] font-black uppercase tracking-widest hover:opacity-80 transition">Read Full Analysis ↓</button>
                <div id="reportSection" class="mt-12 pt-12 border-t border-white/10">
                    <div class="text-lg text-slate-300 leading-relaxed space-y-6 whitespace-pre-line">Standard maintenance in progress.</div>
                </div>
            </section>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-3xl"><h3 class="text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Audit_Log</h3><div class="text-[10px] mono text-slate-400 uppercase"><p class="mb-2">> Check Nodes</p></div></div>
                <div class="glass p-8 rounded-3xl" style="background: #3b82f622"><h3 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest tracking-widest">Skill_Sync</h3><p class="text-sm font-bold italic leading-snug">"Always verify hash."</p></div>
            </div>
        </div>
        <aside class="lg:col-span-4">
            <div class="glass p-8 rounded-[2.5rem]">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-8 tracking-[0.3em] italic">Intelligence_Archive</h3>
                <div class="mono"><!-- HIST_S --><div class='mb-4 border-l border-white/10 pl-4'><p class='text-[10px] opacity-50'>16 May 2026 | 17:26 UTC</p><p class='text-[11px] font-bold'>Neural Protocol Sync</p></div><!-- HIST_E --></div>
            </div>
        </aside>
    </main>
    <script>
        function toggle() {
            var x = document.getElementById("reportSection");
            var b = document.getElementById("btn");
            if (x.style.display === "none" || x.style.display === "") { x.style.display = "block"; b.innerHTML = "Close Report ↑"; }
            else { x.style.display = "none"; b.innerHTML = "Read Full Analysis ↓"; }
        }
    </script>
</body>
</html>
